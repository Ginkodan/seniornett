services:
  app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5176"
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
    expose:
      - "5176"

  identity-api:
    image: node:20-alpine
    working_dir: /srv
    command: sh -c "npm install && npm start"
    environment:
      - PORT=3001
    volumes:
      - ./docker/identity-api:/srv
    expose:
      - "3001"

  proxy:
    image: nginx:alpine
    depends_on:
      - app
      - identity-api
    ports:
      - "5173-5185:5173-5185"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  app_node_modules:
