services:
  app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      DATABASE_URL: postgres://seniornett:seniornett_dev@postgres:5432/seniornett
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
    expose:
      - "5176"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       seniornett
      POSTGRES_USER:     seniornett
      POSTGRES_PASSWORD: seniornett_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seniornett"]
      interval: 5s
      timeout: 3s
      retries: 10

  identity-api:
    image: node:20-alpine
    working_dir: /srv
    command: sh -c "npm install && npm start"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://seniornett:seniornett_dev@postgres:5432/seniornett
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./docker/identity-api:/srv
    expose:
      - "3001"

  proxy:
    image: nginx:alpine
    depends_on:
      - app
      - identity-api
    ports:
      - "5173-5185:5173-5185"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  app_node_modules:
  postgres_data:
