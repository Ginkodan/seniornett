events {
  worker_connections 1024;
}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream app_upstream {
    server app:5176;
  }

  upstream identity_upstream {
    server identity-api:3001;
  }

  server {
    listen 5173;
    listen 5174;
    listen 5175;
    listen 5176;
    listen 5177;
    listen 5178;
    listen 5179;
    listen 5180;
    listen 5181;
    listen 5182;
    listen 5183;
    listen 5184;
    listen 5185;
    server_name _;

    # Auth subrequest — only nginx can call this
    location = /internal/auth {
      internal;
      proxy_pass              http://identity_upstream/internal/auth;
      proxy_set_header        X-Source-Port $server_port;
      proxy_set_header        X-Forwarded-For $remote_addr;
      proxy_pass_request_body off;
      proxy_set_header        Content-Length "";
      proxy_set_header        Host $host;
    }

    # Identity JSON for the SPA — auth_request runs first, headers injected
    location = /api/identity {
      auth_request /internal/auth;
      auth_request_set $user_id   $upstream_http_x_user_id;
      auth_request_set $user_name $upstream_http_x_user_name;
      auth_request_set $user_language $upstream_http_x_user_language;
      auth_request_set $user_role $upstream_http_x_user_role;
      auth_request_set $device_id $upstream_http_x_device_id;
      auth_request_set $vpn_ip    $upstream_http_x_vpn_ip;

      proxy_pass           http://identity_upstream/api/identity;
      proxy_set_header     X-User-Id   $user_id;
      proxy_set_header     X-User-Name $user_name;
      proxy_set_header     X-User-Language $user_language;
      proxy_set_header     X-User-Role $user_role;
      proxy_set_header     X-Device-Id $device_id;
      proxy_set_header     X-Vpn-Ip    $vpn_ip;
      proxy_set_header     Host $http_host;
      proxy_set_header     X-Forwarded-Host $http_host;
      proxy_set_header     X-Forwarded-Proto $scheme;
    }

    # All other requests — auth_request validates, identity headers injected into app
    location / {
      auth_request /internal/auth;
      auth_request_set $user_id   $upstream_http_x_user_id;
      auth_request_set $user_name $upstream_http_x_user_name;
      auth_request_set $user_language $upstream_http_x_user_language;
      auth_request_set $user_role $upstream_http_x_user_role;
      auth_request_set $device_id $upstream_http_x_device_id;
      auth_request_set $vpn_ip    $upstream_http_x_vpn_ip;

      proxy_pass http://app_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-User-Id   $user_id;
      proxy_set_header X-User-Name $user_name;
      proxy_set_header X-User-Language $user_language;
      proxy_set_header X-User-Role $user_role;
      proxy_set_header X-Device-Id $device_id;
      proxy_set_header X-Vpn-Ip    $vpn_ip;
    }
  }
}
