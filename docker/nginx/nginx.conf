events {
  worker_connections 1024;
}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream app_upstream {
    server app:5176;
  }

  upstream identity_upstream {
    server identity-api:3001;
  }

  server {
    listen 5173;
    listen 5174;
    listen 5175;
    listen 5176;
    listen 5177;
    listen 5178;
    listen 5179;
    listen 5180;
    listen 5181;
    listen 5182;
    listen 5183;
    listen 5184;
    listen 5185;
    server_name _;

    location = /api/whoami {
      proxy_pass http://identity_upstream/api/whoami;
      proxy_set_header X-Source-Port $server_port;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://app_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Source-Port $server_port;
      proxy_set_header X-Forwarded-For $remote_addr;
    }
  }
}
